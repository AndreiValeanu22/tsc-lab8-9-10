name: Verificări Python (Laborator 10)

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  verificari-statice:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LAB10/lab10_static_demo
    steps:
      - uses: actions/checkout@v4

      - name: Configurează Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalează uneltele
        run: python -m pip install -r requirements-dev.txt

      - name: Pylint
        run: python -m pylint statistics_demo.py tests
        continue-on-error: true
        id: pylint

      - name: Ruff
        run: python -m ruff check statistics_demo.py tests
        continue-on-error: true
        id: ruff

      - name: Black (verificare, fără modificări)
        run: python -m black --check statistics_demo.py tests
        continue-on-error: true
        id: black

      - name: Bandit
        run: python -m bandit -q -r statistics_demo.py
        continue-on-error: true
        id: bandit

      - name: Pytype
        run: python -m pytype statistics_demo.py
        continue-on-error: true
        id: pytype

      - name: Rezumat — eșuează dacă a eșuat vreo unealtă
        if: always()
        run: |
          e=0
          if [ "${{ steps.pylint.outcome }}" != "success" ]; then echo "Pylint a raportat probleme."; e=1; fi
          if [ "${{ steps.ruff.outcome }}" != "success" ]; then echo "Ruff a raportat probleme."; e=1; fi
          if [ "${{ steps.black.outcome }}" != "success" ]; then echo "Black a raportat probleme."; e=1; fi
          if [ "${{ steps.bandit.outcome }}" != "success" ]; then echo "Bandit a raportat probleme."; e=1; fi
          if [ "${{ steps.pytype.outcome }}" != "success" ]; then echo "Pytype a raportat probleme."; e=1; fi
          exit $e
